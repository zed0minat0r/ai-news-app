<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Pulse — AI News Aggregator</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
  <header id="site-header">
    <div class="header-inner">
      <div class="logo">
        <span class="logo-icon">⚡</span>
        <h1>AI Pulse</h1>
      </div>
      <p class="tagline">Real-time AI news, models &amp; hardware</p>
      <div class="search-wrapper">
        <div class="search-inner">
          <span class="search-icon" aria-hidden="true">&#128269;</span>
          <input type="text" id="search-input" placeholder="Search articles..." aria-label="Search articles">
          <button id="search-clear" type="button" aria-label="Clear search">&times;</button>
        </div>
        <p id="result-count" aria-live="polite"></p>
      </div>
      <p class="last-updated" id="last-updated"></p>
    </div>
  </header>

  <nav id="category-nav">
    <div class="nav-inner">
      <button class="cat-pill active" data-category="all" aria-pressed="true">All</button>
      <button class="cat-pill" data-category="models" aria-pressed="false">Models</button>
      <button class="cat-pill" data-category="hardware" aria-pressed="false">Hardware</button>
      <button class="cat-pill" data-category="research" aria-pressed="false">Research</button>
      <button class="cat-pill" data-category="tools" aria-pressed="false">Tools</button>
      <button class="cat-pill" data-category="industry" aria-pressed="false">Industry</button>
    </div>
  </nav>

  <main>
    <section id="featured-section">
      <!-- Populated by JS -->
    </section>

    <section id="hardware-spotlight">
      <h2 class="section-title">Hardware Spotlight</h2>
      <div id="hardware-grid" class="card-grid">
        <!-- Populated by JS -->
      </div>
    </section>

    <section id="news-section">
      <h2 class="section-title">Latest Stories</h2>
      <div id="news-grid" class="card-grid">
        <!-- Populated by JS -->
      </div>
    </section>

    <p id="no-results" class="hidden" role="status">No articles match your search.</p>
  </main>

  <button id="back-to-top" class="back-to-top hidden" aria-label="Back to top">&uarr;</button>

  <footer>
    <p>AI Pulse &mdash; Built by Builder &mdash; <span id="footer-year"></span></p>
  </footer>

  <script src="main.js"></script>
</body>
</html>
