<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Pulse — AI News Aggregator</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <!-- Firebase SDK (CDN) -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-app.js";
    import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-auth.js";

    /* TODO: Replace with real Firebase project config from console.firebase.google.com */
    const firebaseConfig = {
      apiKey: "YOUR_API_KEY",
      authDomain: "YOUR_PROJECT.firebaseapp.com",
      projectId: "YOUR_PROJECT",
      storageBucket: "YOUR_PROJECT.firebasestorage.app",
      messagingSenderId: "000000000000",
      appId: "1:000000000000:web:0000000000000000"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();

    window.aiPulseAuth = { auth, provider, signInWithPopup, signOut, onAuthStateChanged };
  </script>
</head>
<body>
  <a href="#main-content" class="skip-link">Skip to main content</a>
  <header id="site-header">
    <div class="header-inner">
      <div class="header-top-row">
        <div class="logo">
          <span class="logo-icon">⚡</span>
          <h1>AI Pulse</h1>
        </div>
        <button id="auth-btn" class="auth-btn" aria-label="Sign in with Google" title="Sign in">
          <svg class="auth-icon" viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        </button>
        <img id="auth-avatar" class="auth-avatar hidden" alt="User avatar" width="36" height="36">
      </div>
      <p class="tagline">Real-time AI news, models &amp; hardware</p>
      <div class="search-wrapper">
        <div class="search-inner">
          <span class="search-icon" aria-hidden="true">&#128269;</span>
          <input type="text" id="search-input" placeholder="Search articles..." aria-label="Search articles">
          <button id="search-clear" type="button" aria-label="Clear search">&times;</button>
        </div>
        <p id="result-count" aria-live="polite"></p>
      </div>
      <p class="last-updated" id="last-updated"></p>
      <!-- Compact header signup bar -->
      <div class="header-signup" id="header-signup">
        <form class="header-signup-form" action="https://formspree.io/f/xpwzgkjq" method="POST" data-newsletter="header">
          <label for="header-email" class="sr-only">Email address</label>
          <input type="email" id="header-email" name="email" placeholder="Your email for daily AI updates" required>
          <button type="submit">Subscribe</button>
        </form>
        <p class="header-signup-success hidden" aria-live="polite">You're subscribed!</p>
      </div>
    </div>
  </header>

  <nav id="category-nav">
    <div class="nav-inner">
      <button class="cat-pill active" data-category="all" aria-pressed="true">All <span class="pill-count"></span></button>
      <button class="cat-pill" data-category="models" aria-pressed="false">Models <span class="pill-count"></span></button>
      <button class="cat-pill" data-category="hardware" aria-pressed="false">Hardware <span class="pill-count"></span></button>
      <button class="cat-pill" data-category="research" aria-pressed="false">Research <span class="pill-count"></span></button>
      <button class="cat-pill" data-category="tools" aria-pressed="false">Tools <span class="pill-count"></span></button>
      <button class="cat-pill" data-category="industry" aria-pressed="false">Industry <span class="pill-count"></span></button>
    </div>
  </nav>

  <main id="main-content">
    <!-- HOMEPAGE VIEW (shown when category=all and no search) -->
    <div id="homepage-view">
      <!-- SKELETON LOADING STATE -->
      <div id="skeleton-loading" class="skeleton-loading" aria-hidden="true">
        <div class="skeleton-hero">
          <div class="skeleton-pill"></div>
          <div class="skeleton-line skeleton-line--title"></div>
          <div class="skeleton-line skeleton-line--text"></div>
          <div class="skeleton-line skeleton-line--text skeleton-line--short"></div>
          <div class="skeleton-line skeleton-line--meta"></div>
        </div>
        <div class="skeleton-trending-label"></div>
        <div class="skeleton-trending">
          <div class="skeleton-chip"></div>
          <div class="skeleton-chip"></div>
          <div class="skeleton-chip"></div>
        </div>
        <div class="skeleton-cards">
          <div class="skeleton-card"><div class="skeleton-line skeleton-line--title"></div><div class="skeleton-line skeleton-line--text"></div><div class="skeleton-line skeleton-line--meta"></div></div>
          <div class="skeleton-card"><div class="skeleton-line skeleton-line--title"></div><div class="skeleton-line skeleton-line--text"></div><div class="skeleton-line skeleton-line--meta"></div></div>
        </div>
      </div>

      <!-- HERO BANNER -->
      <section id="hero-section" role="region" aria-label="Featured story"></section>

      <!-- TRENDING BAR -->
      <section id="trending-bar" role="region" aria-labelledby="trending-title">
        <h2 id="trending-title" class="section-label">Trending Now</h2>
        <div class="trending-scroll-wrapper">
          <div id="trending-scroll" class="trending-scroll"></div>
        </div>
      </section>

      <!-- CATEGORY SECTIONS (populated by JS) -->
      <div id="category-sections"></div>
    </div>

    <!-- Screen reader announcement for sort changes -->
    <div id="sort-announcement" class="sr-only" aria-live="assertive" role="status"></div>

    <!-- LIST VIEW (shown when filtering or searching) -->
    <div id="list-view" class="hidden">
      <section id="news-section" role="region" aria-labelledby="news-title">
        <div class="section-header">
          <h2 id="news-title" class="section-title">Results</h2>
          <button id="sort-toggle" class="sort-toggle" aria-label="Toggle sort order">Newest first</button>
        </div>
        <div id="news-grid" class="card-grid"></div>
        <button id="load-more-btn" class="load-more-btn hidden">Load more</button>
      </section>
    </div>

    <p id="no-results" class="hidden" role="status">No articles match your search.</p>
  </main>

  <!-- Newsletter signup section -->
  <section id="newsletter-section" class="newsletter-section" role="region" aria-label="Newsletter signup">
    <div class="newsletter-inner">
      <h2 class="newsletter-heading">Stay ahead of the AI curve</h2>
      <p class="newsletter-subtext">Get the top stories delivered daily.</p>
      <form class="newsletter-form" action="https://formspree.io/f/xpwzgkjq" method="POST" data-newsletter="main">
        <label for="newsletter-email" class="sr-only">Email address</label>
        <input type="email" id="newsletter-email" name="email" placeholder="Enter your email" required>
        <button type="submit">Subscribe</button>
      </form>
      <p class="newsletter-success hidden" aria-live="polite">You're subscribed!</p>
      <p class="newsletter-privacy">No spam. Unsubscribe anytime.</p>
    </div>
  </section>

  <button id="back-to-top" class="back-to-top hidden" aria-label="Back to top">&uarr;</button>

  <footer>
    <p>AI Pulse &mdash; Built by Builder &mdash; <span id="footer-year"></span></p>
  </footer>

  <script src="main.js"></script>
  <script type="module">
    /* =========================================================
       FIREBASE AUTH – Google Sign-In (Step 1 of Dashboard)
       ========================================================= */
    (function initAuth() {
      const { auth, provider, signInWithPopup, signOut, onAuthStateChanged } = window.aiPulseAuth || {};
      if (!auth) return;

      const btn = document.getElementById("auth-btn");
      const avatar = document.getElementById("auth-avatar");
      let currentUser = null;

      onAuthStateChanged(auth, (user) => {
        currentUser = user;
        if (user) {
          // Logged in – show avatar, hide icon button
          btn.classList.add("hidden");
          avatar.src = user.photoURL || "";
          avatar.alt = user.displayName || "User";
          avatar.classList.remove("hidden");
        } else {
          // Logged out – show icon button, hide avatar
          btn.classList.remove("hidden");
          avatar.classList.add("hidden");
        }
      });

      btn.addEventListener("click", () => {
        signInWithPopup(auth, provider).catch((err) => {
          if (err.code !== "auth/popup-closed-by-user") {
            console.error("Auth error:", err);
          }
        });
      });

      avatar.addEventListener("click", () => {
        if (currentUser && confirm("Sign out of AI Pulse?")) {
          signOut(auth);
        }
      });
    })();
  </script>
</body>
</html>
